<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trader Quest – Neon AI v3.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        orbitron: ['Orbitron', 'sans-serif'],
                        rajdhani: ['Rajdhani', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Rajdhani', sans-serif; background-color: #020617; }
        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #22d3ee; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // --- ICON SYSTEM ---
    const Icon = ({ name, className = "w-4 h-4" }) => {
        const paths = {
            "trending-up": <g><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></g>,
            "trending-down": <g><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></g>,
            "coins": <g><circle cx="8" cy="8" r="6"></circle><circle cx="18" cy="18" r="4"></circle><path d="M12 18a6 6 0 0 0-6-6"></path></g>,
            "rotate-ccw": <g><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></g>,
            "plus": <g><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></g>,
            "trash-2": <g><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></g>,
            "alert-triangle": <g><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></g>,
            "award": <g><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></g>,
            "volume-2": <g><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></g>,
            "volume-x": <g><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></g>,
            "edit-3": <g><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></g>,
            "check": <g><polyline points="20 6 9 17 4 12"></polyline></g>,
            "x": <g><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></g>,
            "sparkles": <g><path d="M12 3v1M12 20v1M21 12h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"></path></g>,
            "info": <g><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></g>,
            "shield-check": <g><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><polyline points="9 11 11 13 15 9"></polyline></g>,
            "download": <g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></g>,
            "upload": <g><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></g>,
            "history": <g><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline><line x1="12" y1="7" x2="12" y2="12"></line><line x1="12" y1="12" x2="16" y2="14"></line></g>,
            "calendar": <g><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></g>,
            "bar-chart-3": <g><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></g>,
            "brain": <g><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44 2.5 2.5 0 0 1 0-3.12 3 3 0 0 1 0-4.88 2.5 2.5 0 0 1 0-3.12A2.5 2.5 0 0 1 9.5 2zM14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44 2.5 2.5 0 0 0 0-3.12 3 3 0 0 0 0-4.88 2.5 2.5 0 0 0 0-3.12A2.5 2.5 0 0 0 14.5 2z"></path></g>,
            "message-square": <g><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></g>,
            "play": <g><polygon points="5 3 19 12 5 21 5 3"></polygon></g>,
            "square": <g><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect></g>,
            "activity": <g><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></g>,
            "user": <g><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></g>,
            "compass": <g><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></g>
        };
        return (
            <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                {paths[name] || <circle cx="12" cy="12" r="10"></circle>}
            </svg>
        );
    };

    // --- SISTEMA DE ÁUDIO ---
    const playSound = (type, muted) => {
        if (muted) return;
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const now = ctx.currentTime;
            if (type === 'success') {
                const frequencies = [349.23, 523.25, 698.46];
                frequencies.forEach((freq, index) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + index * 0.08);
                    gain.gain.setValueAtTime(0.08, now + index * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + index * 0.08 + 0.2);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(now + index * 0.08); osc.stop(now + index * 0.08 + 0.25);
                });
            } else if (type === 'danger') {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(140, now);
                osc.frequency.linearRampToValueAtTime(90, now + 0.35);
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.setValueAtTime(300, now);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
                osc.start(now); osc.stop(now + 0.45);
            } else if (type === 'click') {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(880, now);
                gain.gain.setValueAtTime(0.03, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(now); osc.stop(now + 0.06);
            }
        } catch (e) { console.warn("Audio blocked:", e); }
    };

    // --- MAIN APP ---
    function App() {
        const [bancaInicial, setBancaInicial] = useState(() => {
            const saved = localStorage.getItem('tq_banca_ini');
            const parsed = parseFloat(saved);
            return !isNaN(parsed) && parsed > 0 ? parsed : 100;
        });

        const [historico, setHistorico] = useState(() => {
            try {
                const saved = localStorage.getItem('tq_hist_v2');
                return saved ? JSON.parse(saved) : [
                    { id: 1, data: '2026-05-26', valor: 15, tipo: 'gain' },
                    { id: 2, data: '2026-05-27', valor: 8, tipo: 'loss' },
                    { id: 3, data: '2026-05-28', valor: 22, tipo: 'gain' }
                ];
            } catch (e) { return []; }
        });

        const [resultadoOp, setResultadoOp] = useState('');
        const [tipoOp, setTipoOp] = useState('gain');
        const [dataOp, setDataOp] = useState(() => new Date().toISOString().split('T')[0]);
        const [muted, setMuted] = useState(false);
        const [isEditingBanca, setIsEditingBanca] = useState(false);
        const [bancaInputTemp, setBancaInputTemp] = useState(bancaInicial.toString());
        const [alerta, setAlerta] = useState(null);
        const [activeTab, setActiveTab] = useState('dashboard');
        const [showResetModal, setShowResetModal] = useState(false);
        const fileInputRef = useRef(null);
        const chatBottomRef = useRef(null);

        // AI states
        const [messages, setMessages] = useState([{
            role: 'model',
            text: "Saudações, Guardião. Eu sou a Inteligência de Controle e Psicologia Cognitiva de Risco do Trader Quest. Estou aqui para analisar seu comportamento operacional e blindar seu cérebro contra a euforia, ansiedade e autossabotagem. Como está sua mente hoje?"
        }]);
        const [inputMessage, setInputMessage] = useState('');
        const [isAiLoading, setIsAiLoading] = useState(false);
        const [aiAuditReport, setAiAuditReport] = useState(() => {
            return localStorage.getItem('tq_ai_audit_v2') || "Clique em 'Auditar Dados' para realizar um diagnóstico de trading do seu histórico real.";
        });
        const [aiAuditLoading, setAiAuditLoading] = useState(false);

        // Persistência automática
        useEffect(() => {
            localStorage.setItem('tq_banca_ini', bancaInicial.toString());
            localStorage.setItem('tq_hist_v2', JSON.stringify(historico));
        }, [bancaInicial, historico]);

        // Auto-scroll chat
        useEffect(() => {
            chatBottomRef.current?.scrollIntoView({ behavior: 'smooth' });
        }, [messages, isAiLoading]);

        const historicoProcessado = useMemo(() => {
            let bancaCorrente = bancaInicial;
            return historico.map(item => {
                const valorAssinado = item.tipo === 'gain' ? Math.abs(item.valor) : -Math.abs(item.valor);
                const porcCalculada = bancaCorrente > 0 ? (valorAssinado / bancaCorrente) * 100 : 0;
                const bancaAnterior = bancaCorrente;
                bancaCorrente += valorAssinado;
                return { ...item, bancaNoMomento: bancaAnterior, porcentagem: porcCalculada, resultadoFinalBanca: bancaCorrente };
            });
        }, [historico, bancaInicial]);

        const bancaAtual = useMemo(() => {
            if (historicoProcessado.length === 0) return bancaInicial;
            return historicoProcessado[historicoProcessado.length - 1].resultadoFinalBanca;
        }, [historicoProcessado, bancaInicial]);

        const stats = useMemo(() => {
            const totalDays = historicoProcessado.length;
            const taxaCDIDiaria = 0.041;
            const taxaPoupancaDiaria = 0.019;
            const rendimentoTotalAbsoluto = bancaAtual - bancaInicial;
            const rendimentoTotalPercentual = bancaInicial > 0 ? (rendimentoTotalAbsoluto / bancaInicial) * 100 : 0;
            if (totalDays === 0) return { avg: 0, totalGeral: 0, diasGain: 0, diasLoss: 0, comparacaoCDI: 0, comparacaoPoupanca: 0, rendimentoTotalAbsoluto: 0 };
            const somaPorcentagens = historicoProcessado.reduce((acc, curr) => acc + curr.porcentagem, 0);
            const mediaDiaria = somaPorcentagens / totalDays;
            const diasGain = historicoProcessado.filter(x => x.tipo === 'gain').length;
            const diasLoss = totalDays - diasGain;
            return {
                avg: mediaDiaria, totalGeral: rendimentoTotalPercentual, diasGain, diasLoss,
                comparacaoCDI: mediaDiaria > 0 ? mediaDiaria / taxaCDIDiaria : 0,
                comparacaoPoupanca: mediaDiaria > 0 ? mediaDiaria / taxaPoupancaDiaria : 0,
                rendimentoTotalAbsoluto
            };
        }, [historicoProcessado, bancaAtual, bancaInicial]);

        // --- ANTHROPIC AI ---
        const askClaude = async (userPrompt, systemPrompt = "") => {
            const response = await fetch("https://api.anthropic.com/v1/messages", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "claude-sonnet-4-20250514",
                    max_tokens: 1000,
                    system: systemPrompt,
                    messages: [{ role: "user", content: userPrompt }]
                })
            });
            if (!response.ok) throw new Error("HTTP error " + response.status);
            const data = await response.json();
            return data.content?.[0]?.text || null;
        };

        const handleDeepAiAudit = async () => {
            playSound('click', muted);
            setAiAuditLoading(true);
            const dataContext = { bancaInicial, bancaAtual, stats, historico: historicoProcessado.slice(-10) };
            const prompt = `Analise clinicamente o seguinte histórico e comportamento do trader com foco em psicologia cognitiva de risco. Seja direto, sincero, use tom de mentor focado e de alta performance. Identifique se o trader está sob risco de ansiedade, sobre-exposição ou euforia.
Banca Inicial: R$ ${dataContext.bancaInicial}
Banca Atual: R$ ${dataContext.bancaAtual?.toFixed(2)}
Média diária: ${dataContext.stats.avg.toFixed(2)}%
Vitórias: ${dataContext.stats.diasGain} dias | Derrotas: ${dataContext.stats.diasLoss} dias
Rendimento Total: ${dataContext.stats.totalGeral.toFixed(2)}%
Últimas 10 operações: ${JSON.stringify(dataContext.historico.map(h => ({ data: h.data, resultado: h.tipo === 'gain' ? '+' + h.valor : '-' + h.valor, porc: h.porcentagem.toFixed(2) + "%" })))}

Responda em formato de leitura rápida contendo:
1. DIAGNÓSTICO PSICOLÓGICO DO PERFIL (Euforia / Ansiedade / Consistência)
2. FATORES DE RISCO DE QUEBRA DE GESTÃO
3. MISSÃO DE DISCIPLINA RECOMENDADA PARA AMANHÃ`;
            const systemPrompt = "Você é o Guardião Psicológico do Trader Quest. Seu objetivo é blindar o psicológico do trader analisando seus números. Seja assertivo, não enrole, compare o rendimento com os bancos para provar que ele já ganhou bastante e use tons firmes se notar alto drawdown ou grande número de operações consecutivas. Responda em português do Brasil.";
            try {
                const review = await askClaude(prompt, systemPrompt);
                if (review) {
                    setAiAuditReport(review);
                    localStorage.setItem('tq_ai_audit_v2', review);
                    playSound('success', muted);
                }
            } catch (e) {
                console.error("Erro ao auditar:", e);
                setAiAuditReport("Erro ao conectar com o AI. Tente novamente.");
            } finally {
                setAiAuditLoading(false);
            }
        };

        const handleSendMessage = async (e) => {
            if (e) e.preventDefault();
            if (!inputMessage.trim() || isAiLoading) return;
            const userText = inputMessage;
            setInputMessage('');
            playSound('click', muted);
            setMessages(prev => [...prev, { role: 'user', text: userText }]);
            setIsAiLoading(true);
            const contextPrompt = `Histórico atualizado do Trader: Banca: R$ ${bancaAtual.toFixed(2)} (Início: R$ ${bancaInicial.toFixed(2)}). Média diária: ${stats.avg.toFixed(2)}%. Dias de Gain: ${stats.diasGain}. Dias de Loss: ${stats.diasLoss}.
Mensagem do usuário: "${userText}"`;
            const systemInstruction = `Você é o Guardião Trader Quest, um psicólogo e mentor comportamental de trading de alta fidelidade e hiper-foco. Seu objetivo principal é conter o over-trading, a ansiedade, a euforia e a ganância do usuário. Explique os perigos biológicos de dopamina no cérebro quando o trader ganha ou perde. Seja conciso (máximo de 3 parágrafos). Diga verdades duras se ele estiver agindo por vingança operacional (revenge trading). Responda em português do Brasil.`;
            try {
                const responseText = await askClaude(contextPrompt, systemInstruction);
                if (responseText) {
                    setMessages(prev => [...prev, { role: 'model', text: responseText }]);
                    playSound('success', muted);
                }
            } catch (err) {
                console.error("Erro ao conectar com AI Coach:", err);
                setMessages(prev => [...prev, { role: 'model', text: "Desculpe, Guardião. Minhas frequências de rede flutuaram. Por favor, tente enviar sua mensagem novamente." }]);
            } finally {
                setIsAiLoading(false);
            }
        };

        const triggerPresetPrompt = (presetText) => setInputMessage(presetText);

        const handleAddOperacao = (e) => {
            e.preventDefault();
            const valorNum = parseFloat(resultadoOp);
            if (isNaN(valorNum) || valorNum <= 0) return;
            playSound('click', muted);
            const novoItem = { id: Date.now(), data: dataOp, valor: valorNum, tipo: tipoOp };
            const novoHistorico = [...historico, novoItem];
            setHistorico(novoHistorico);
            setResultadoOp('');
            const valorAssinado = tipoOp === 'gain' ? valorNum : -valorNum;
            const porcCriada = bancaAtual > 0 ? (valorAssinado / bancaAtual) * 100 : 0;
            if (tipoOp === 'gain') {
                playSound('success', muted);
                if (porcCriada > 5) {
                    setAlerta({
                        titulo: "🛡️ ALERTA DE HIPER-EUFORIA!",
                        mensagem: `Você fez incríveis ${porcCriada.toFixed(2)}% hoje! Isso equivale a aproximadamente ${Math.round(porcCriada / 0.019)} dias de rendimento na Poupança tradicional. A dopamina no cérebro está ativa e fará você acreditar que é infalível. Pare agora para cristalizar esse ganho e proteja seu capital.`,
                        tipo: 'euforia'
                    });
                }
            } else {
                playSound('danger', muted);
                if (Math.abs(porcCriada) > 3) {
                    setAlerta({
                        titulo: "⚠️ FREIO DE SEGURANÇA OPERACIONAL",
                        mensagem: `Você perdeu ${Math.abs(porcCriada).toFixed(2)}% da sua banca hoje. O desejo subconsciente de recuperar o valor agora fará você aumentar o lote e quebrar o gerenciamento. Aceite esse pequeno arranhão operacional. Volte amanhã com a mente limpa.`,
                        tipo: 'perda'
                    });
                }
            }
        };

        const handleSaveBancaInicial = () => {
            const val = parseFloat(bancaInputTemp);
            if (!isNaN(val) && val > 0) {
                playSound('success', muted);
                setBancaInicial(val);
                setIsEditingBanca(false);
            }
        };

        const handleDeleteItem = (id) => {
            playSound('danger', muted);
            setHistorico(historico.filter(x => x.id !== id));
        };

        const handleExportBackup = () => {
            playSound('success', muted);
            const dataStr = JSON.stringify({ bancaInicial, historico });
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            const exportFileDefaultName = `trader_quest_backup_${new Date().toISOString().split('T')[0]}.json`;
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
        };

        const handleImportBackup = (e) => {
            const fileReader = new FileReader();
            if (e.target.files && e.target.files[0]) {
                fileReader.readAsText(e.target.files[0], "UTF-8");
                fileReader.onload = ev => {
                    try {
                        const parsed = JSON.parse(ev.target.result);
                        if (parsed.bancaInicial && Array.isArray(parsed.historico)) {
                            playSound('success', muted);
                            setBancaInicial(Number(parsed.bancaInicial));
                            setHistorico(parsed.historico);
                        }
                    } catch (err) { console.error("Erro ao importar backup", err); }
                };
            }
        };

        const executeResetQuest = () => {
            playSound('danger', muted);
            setHistorico([]);
            setBancaInicial(100);
            setBancaInputTemp('100');
            setShowResetModal(false);
        };

        return (
            <div className="min-h-screen bg-[#020617] text-slate-200 font-sans p-3 sm:p-6">
                <div className="fixed -top-40 -left-40 w-96 h-96 bg-cyan-500/5 rounded-full blur-[120px] pointer-events-none"></div>
                <div className="fixed -bottom-40 -right-40 w-96 h-96 bg-indigo-500/5 rounded-full blur-[120px] pointer-events-none"></div>

                <div className="max-w-6xl mx-auto space-y-6">

                    {/* HEADER */}
                    <header className="flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-900/40 border border-slate-800 p-4 rounded-3xl backdrop-blur-md shadow-[0_0_20px_rgba(34,211,238,0.03)]">
                        <div className="flex items-center gap-3">
                            <div className="relative group p-2.5 bg-cyan-500/10 border border-cyan-500/30 rounded-2xl overflow-hidden transition-all duration-300 hover:border-cyan-400 hover:shadow-[0_0_15px_rgba(34,211,238,0.3)]">
                                <Icon name="coins" className="w-7 h-7 text-cyan-400 group-hover:scale-110 transition-transform duration-300" />
                            </div>
                            <div>

                                <h3 className="text-xs uppercase font-mono tracking-widest text-slate-400 mb-4">Relatório Consolidado Geral</h3>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse text-xs">
                                        <thead>
                                            <tr className="border-b border-slate-800 font-mono text-slate-400">
                                                <th className="pb-3 pr-2">Data</th>
                                                <th className="pb-3 px-2">Banca Anterior</th>
                                                <th className="pb-3 px-2">Operação</th>
                                                <th className="pb-3 px-2">Porcentagem</th>
                                                <th className="pb-3 pl-2">Banca Atualizada</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-800/40">
                                            {historicoProcessado.length === 0 ? (
                                                <tr><td colSpan="5" className="py-4 text-center text-slate-600">Sem histórico para computar relatórios detalhados</td></tr>
                                            ) : (
                                                historicoProcessado.map((item) => (
                                                    <tr key={item.id} className="hover:bg-slate-800/20 transition-all">
                                                        <td className="py-3 pr-2 font-mono">{item.data}</td>
                                                        <td className="py-3 px-2 font-mono text-slate-400">R$ {item.bancaNoMomento.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                                                        <td className={`py-3 px-2 font-mono font-bold ${item.tipo === 'gain' ? 'text-cyan-400' : 'text-rose-400'}`}>
                                                            {item.tipo === 'gain' ? '+' : '-'} R$ {item.valor.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                                        </td>
                                                        <td className={`py-3 px-2 font-mono font-bold ${item.tipo === 'gain' ? 'text-cyan-500' : 'text-rose-500'}`}>
                                                            {item.tipo === 'gain' ? '+' : ''}{(item.porcentagem ?? 0).toFixed(2)}%
                                                        </td>
                                                        <td className="py-3 pl-2 font-mono text-white font-semibold">R$ {item.resultadoFinalBanca.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* AI COACH TAB */}
                    {activeTab === 'ai_coach' && (
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            <div className="lg:col-span-7 bg-slate-900/30 border border-slate-800 rounded-3xl p-6 shadow-xl flex flex-col h-[580px] relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-48 h-48 bg-purple-500/5 blur-3xl rounded-full"></div>

                                <div className="flex items-center justify-between border-b border-slate-800 pb-4 mb-4">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-purple-500/20 border border-purple-500/40 rounded-xl">
                                            <Icon name="brain" className="w-5 h-5 text-purple-400 animate-pulse" />
                                        </div>
                                        <div>
                                            <h3 className="font-mono text-sm font-bold text-white uppercase tracking-wider">Guardião AI Coach</h3>
                                            <p className="text-[10px] text-slate-400 font-mono">Orientador Psicológico de Risco do Trader Quest</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex-1 overflow-y-auto space-y-3 mb-4 pr-1">
                                    {messages.map((msg, idx) => (
                                        <div key={idx} className={`flex gap-3 max-w-[85%] ${msg.role === 'user' ? 'ml-auto flex-row-reverse' : ''}`}>
                                            <div className={`w-8 h-8 rounded-lg flex items-center justify-center shrink-0 ${msg.role === 'user' ? 'bg-cyan-500/10 text-cyan-400 border border-cyan-500/30' : 'bg-purple-500/10 text-purple-400 border border-purple-500/30'}`}>
                                                <Icon name={msg.role === 'user' ? 'user' : 'brain'} className="w-4 h-4" />
                                            </div>
                                            <div className={`p-3.5 rounded-2xl text-xs leading-relaxed font-sans ${msg.role === 'user' ? 'bg-cyan-500/5 border border-cyan-500/20 text-slate-200 rounded-tr-none' : 'bg-slate-950 border border-slate-800 text-slate-300 rounded-tl-none'}`}>
                                                {msg.text}
                                            </div>
                                        </div>
                                    ))}
                                    {isAiLoading && (
                                        <div className="flex gap-3 max-w-[80%]">
                                            <div className="w-8 h-8 rounded-lg bg-purple-500/10 text-purple-400 border border-purple-500/30 flex items-center justify-center shrink-0 animate-spin">
                                                <Icon name="brain" className="w-4 h-4" />
                                            </div>
                                            <div className="bg-slate-950 border border-slate-800 p-3.5 rounded-2xl rounded-tl-none text-xs text-slate-400 font-mono animate-pulse">
                                                Analisando os padrões emocionais e gerando conselho disciplinar...
                                            </div>
                                        </div>
                                    )}
                                    <div ref={chatBottomRef}></div>
                                </div>

                                <div className="flex flex-wrap gap-1.5 mb-2 overflow-x-auto pb-1">
                                    <button onClick={() => triggerPresetPrompt("Hoje eu perdi uma operação e estou com muita vontade de fazer mais entradas para recuperar. O que eu faço?")}
                                        className="text-[10px] bg-slate-950 border border-slate-800 hover:border-rose-500/30 text-rose-400 hover:bg-rose-500/5 px-2.5 py-1.5 rounded-lg transition">
                                        🚨 Evitar Revenge Trading
                                    </button>
                                    <button onClick={() => triggerPresetPrompt("Bati minha meta diária de hoje com facilidade, mas a vontade de continuar operando para ganhar mais está forte.")}
                                        className="text-[10px] bg-slate-950 border border-slate-800 hover:border-cyan-500/30 text-cyan-400 hover:bg-cyan-500/5 px-2.5 py-1.5 rounded-lg transition">
                                        🏆 Ganância (Bati Meta)
                                    </button>
                                    <button onClick={() => triggerPresetPrompt("Estou sentindo muita ansiedade antes de abrir uma nova operação. Como posso relaxar e seguir o plano?")}
                                        className="text-[10px] bg-slate-950 border border-slate-800 hover:border-purple-500/30 text-purple-400 hover:bg-purple-500/5 px-2.5 py-1.5 rounded-lg transition">
                                        🧠 Ansiedade pré-trade
                                    </button>
                                </div>

                                <form onSubmit={handleSendMessage} className="flex gap-2 border-t border-slate-800 pt-3">
                                    <input type="text" value={inputMessage} onChange={(e) => setInputMessage(e.target.value)}
                                        placeholder="Relate como você se sente após o trade de hoje ou peça ajuda..."
                                        className="flex-1 bg-slate-950 border border-slate-800 focus:border-purple-500 text-xs px-4 py-3 rounded-2xl focus:outline-none text-white font-sans transition-all" />
                                    <button type="submit" disabled={isAiLoading || !inputMessage.trim()}
                                        className="bg-purple-600 hover:bg-purple-500 disabled:bg-purple-950/40 text-slate-100 disabled:text-slate-600 border border-purple-500/30 px-5 rounded-2xl font-mono text-xs font-bold transition shadow-[0_0_15px_rgba(168,85,247,0.2)]">
                                        Enviar
                                    </button>
                                </form>
                            </div>

                            <div className="lg:col-span-5 space-y-6">
                                <div className="bg-slate-900/30 border border-slate-800 rounded-3xl p-6 shadow-xl relative overflow-hidden">
                                    <h3 className="text-xs uppercase font-mono tracking-widest text-slate-400 flex items-center gap-1.5 mb-4">
                                        <Icon name="activity" className="w-4 h-4 text-purple-400" /> Indicadores Psicológicos Estimados
                                    </h3>
                                    <div className="space-y-4">
                                        <div className="space-y-1.5">
                                            <div className="flex justify-between text-[11px] font-mono text-slate-400">
                                                <span>Nível de FOMO (Falta de Paciência)</span>
                                                <span className={`font-bold ${stats.avg > 3 ? 'text-rose-400' : 'text-cyan-400'}`}>{stats.avg > 3 ? 'MUITO ALTO' : 'ESTÁVEL'}</span>
                                            </div>
                                            <div className="h-2 w-full bg-slate-950 rounded-full overflow-hidden p-0.5 border border-slate-800">
                                                <div className={`h-full rounded-full transition-all duration-300 ${stats.avg > 3 ? 'bg-rose-500' : 'bg-cyan-500'}`}
                                                    style={{ width: `${Math.min(Math.max((stats.diasGain + stats.diasLoss) * 8, 10), 100)}%` }}></div>
                                            </div>
                                        </div>
                                        <div className="space-y-1.5">
                                            <div className="flex justify-between text-[11px] font-mono text-slate-400">
                                                <span>Risco de Revenge Trading (Vingança)</span>
                                                <span className={`font-bold ${stats.diasLoss > 2 ? 'text-rose-400 animate-pulse' : 'text-cyan-400'}`}>{stats.diasLoss > 2 ? 'RISCO GRAVE' : 'MÍNIMO'}</span>
                                            </div>
                                            <div className="h-2 w-full bg-slate-950 rounded-full overflow-hidden p-0.5 border border-slate-800">
                                                <div className={`h-full rounded-full transition-all duration-300 ${stats.diasLoss > 2 ? 'bg-gradient-to-r from-rose-500 to-red-600 shadow-[0_0_10px_rgba(244,63,94,0.3)]' : 'bg-cyan-500'}`}
                                                    style={{ width: `${Math.min(Math.max(stats.diasLoss * 25, 5), 100)}%` }}></div>
                                            </div>
                                        </div>
                                        <div className="space-y-1.5">
                                            <div className="flex justify-between text-[11px] font-mono text-slate-400">
                                                <span>Índice de Ganância (Greed Indicator)</span>
                                                <span className={`font-bold ${stats.avg > 5 ? 'text-yellow-400' : 'text-cyan-400'}`}>{stats.avg > 5 ? 'PERIGO DE EUFORIA' : 'CONTROLADO'}</span>
                                            </div>
                                            <div className="h-2 w-full bg-slate-950 rounded-full overflow-hidden p-0.5 border border-slate-800">
                                                <div className={`h-full rounded-full transition-all duration-300 ${stats.avg > 5 ? 'bg-yellow-500 shadow-[0_0_10px_rgba(234,179,8,0.3)]' : 'bg-cyan-500'}`}
                                                    style={{ width: `${Math.min(Math.max(stats.avg * 15, 10), 100)}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-slate-900/30 border border-slate-800 rounded-3xl p-6 shadow-xl flex flex-col h-[345px]">
                                    <div className="flex items-center justify-between mb-4">
                                        <h3 className="text-xs font-mono font-bold uppercase tracking-wider text-slate-200 flex items-center gap-1.5">
                                            <Icon name="compass" className="w-4 h-4 text-purple-400 animate-spin" /> Auditoria Comportamental
                                        </h3>
                                        <button onClick={handleDeepAiAudit} disabled={aiAuditLoading || historico.length === 0}
                                            className="text-[10px] font-mono font-bold uppercase tracking-wider bg-purple-500/20 hover:bg-purple-500/30 border border-purple-500/40 text-purple-400 rounded-xl px-3 py-1.5 transition disabled:opacity-30 disabled:pointer-events-none">
                                            {aiAuditLoading ? "Auditando..." : "Auditar Dados"}
                                        </button>
                                    </div>
                                    <div className="flex-1 bg-slate-950/80 border border-slate-800/80 rounded-2xl p-4 overflow-y-auto text-xs leading-relaxed text-slate-400 font-mono space-y-3">
                                        {aiAuditReport.split('\n').map((line, idx) => (<p key={idx}>{line}</p>))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>

                <footer className="border-t border-slate-900 py-6 text-center text-[10px] text-slate-600 space-y-1 mt-8">
                    <p>© 2026 Trader Quest. Todas as análises financeiras são locais, offline e confidenciais.</p>
                    <p className="max-w-md mx-auto leading-relaxed">Não confie em operações impulsivas. Proteja o seu capital a qualquer custo.</p>
                </footer>

                {/* MODAL ALERTA */}
                {alerta && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
                        <div className="bg-[#0b1329] border border-cyan-500/30 rounded-3xl max-w-md w-full overflow-hidden shadow-[0_0_50px_rgba(34,211,238,0.15)] relative">
                            <div className={`p-5 flex items-center gap-3 border-b border-slate-800/80 ${alerta.tipo === 'euforia' ? 'bg-gradient-to-r from-cyan-500/10 to-indigo-500/10' : 'bg-gradient-to-r from-rose-500/10 to-slate-900'}`}>
                                <Icon name={alerta.tipo === 'euforia' ? 'award' : 'alert-triangle'} className={`w-5 h-5 ${alerta.tipo === 'euforia' ? 'text-cyan-400' : 'text-rose-400'}`} />
                                <h3 className="font-bold text-sm uppercase tracking-wider font-mono text-white">{alerta.titulo}</h3>
                            </div>
                            <div className="p-6 space-y-4">
                                <p className="text-xs text-slate-300 leading-relaxed font-sans">{alerta.mensagem}</p>
                                <div className="flex flex-col gap-2 pt-2">
                                    <button onClick={() => { playSound('click', muted); setAlerta(null); }}
                                        className="w-full py-3 bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold font-mono text-xs tracking-widest rounded-xl shadow-[0_0_15px_rgba(34,211,238,0.25)] transition duration-150">
                                        FECHAR DIA & PARAR AGORA 🏆
                                    </button>
                                    <button onClick={() => { playSound('click', muted); setAlerta(null); }}
                                        className="w-full py-3 bg-slate-900 hover:bg-slate-800 border border-slate-700 text-slate-400 hover:text-slate-200 font-mono text-[10px] tracking-wider rounded-xl transition duration-150">
                                        Entendi o Alerta, vou parar.
                                    </button>
                                </div>
                            </div>
                            <button onClick={() => { playSound('click', muted); setAlerta(null); }} className="absolute top-4 right-4 text-slate-500 hover:text-white transition">
                                <Icon name="x" className="w-4 h-4"/>
                            </button>
                        </div>
                    </div>
                )}

                {/* MODAL RESET */}
                {showResetModal && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
                        <div className="bg-[#0b1329] border border-rose-500/30 rounded-3xl max-w-sm w-full overflow-hidden shadow-[0_0_50px_rgba(244,63,94,0.15)] relative">
                            <div className="p-5 flex items-center gap-3 border-b border-slate-800/80 bg-gradient-to-r from-rose-500/10 to-slate-900">
                                <Icon name="rotate-ccw" className="w-5 h-5 text-rose-400" />
                                <h3 className="font-bold text-sm uppercase tracking-wider font-mono text-white">RECOMEÇAR QUEST?</h3>
                            </div>
                            <div className="p-6 space-y-4">
                                <p className="text-xs text-slate-300 leading-relaxed font-sans">Esta ação apagará todo o seu progresso diário, zerará sua banca acumulada e reiniciará a sua jornada. Tem certeza de que quer limpar este histórico?</p>
                                <div className="flex gap-2 pt-2">
                                    <button onClick={executeResetQuest} className="flex-1 py-3 bg-rose-500 hover:bg-rose-400 text-slate-950 font-bold font-mono text-xs tracking-wider rounded-xl transition duration-150">SIM, RESETAR ☠️</button>
                                    <button onClick={() => { playSound('click', muted); setShowResetModal(false); }} className="flex-1 py-3 bg-slate-900 hover:bg-slate-800 border border-slate-700 text-slate-400 font-mono text-xs tracking-wider rounded-xl transition duration-150">NÃO, CANCELAR</button>
                                </div>
                            </div>
                            <button onClick={() => { playSound('click', muted); setShowResetModal(false); }} className="absolute top-4 right-4 text-slate-500 hover:text-white transition">
                                <Icon name="x" className="w-4 h-4"/>
                            </button>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
</script>
</body>
</html>
