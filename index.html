<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trader Quest – Neon AI v3.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        orbitron: ['Orbitron', 'sans-serif'],
                        rajdhani: ['Rajdhani', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Rajdhani', sans-serif; background-color: #020617; color: #f8fafc; }
        .neon-border-blue { box-shadow: 0 0 15px rgba(56, 189, 248, 0.2), inset 0 0 15px rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.4); }
        .neon-border-green { box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); border: 1px solid rgba(34, 197, 94, 0.4); }
        .neon-border-red { box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); }
        .neon-text-blue { text-shadow: 0 0 8px rgba(56, 189, 248, 0.6); }
        .neon-text-green { text-shadow: 0 0 8px rgba(34, 197, 94, 0.6); }
        .neon-text-red { text-shadow: 0 0 8px rgba(239, 68, 68, 0.6); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.4; } }
        .bg-grid { background-size: 30px 30px; background-image: linear-gradient(to right, rgba(51, 65, 85, 0.1) 1px, transparent 1px), linear-gradient(to bottom, rgba(51, 65, 85, 0.1) 1px, transparent 1px); }
    </style>
</head>
<body class="bg-slate-950 min-h-screen relative overflow-x-hidden bg-grid">
    <div id="root"></div>

    <script type="text/babel">
        const GEMINI_API_KEY = "AQ.Ab8RN6J0KXgZ8m6TocQW8_3o2JuhdoXd2GdR5G1QvoZHvoNTtw";

        function playSound(type, muted) {
            if (muted) return;
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.05, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start(); osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'success') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(400, ctx.currentTime);
                    osc.frequency.setValueAtTime(600, ctx.currentTime + 0.08);
                    osc.frequency.setValueAtTime(900, ctx.currentTime + 0.16);
                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'danger') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(70, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                    osc.start(); osc.stop(ctx.currentTime + 0.25);
                } else if (type === 'level') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.06, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.005, ctx.currentTime + 0.5);
                    osc.start(); osc.stop(ctx.currentTime + 0.5);
                }
            } catch (e) { console.log("Audio error", e); }
        }

        function Icon({ name, className = "w-5 h-5" }) {
            const icons = {
                wallet: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />,
                trendingUp: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />,
                trendingDown: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 17h8m0 0v-8m0 8l-8-8-4 4-6-6" />,
                shield: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />,
                brain: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />,
                plus: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6v12m6-6H6" />,
                trash: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />,
                volume: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.536 8.464a5 5 0 010 7.072M18.364 5.636a9 9 0 010 12.728M12 18.75V5.25L7.75 9.5H4.5v5h3.25L12 18.75z" />,
                volumeMute: <><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" strokeLinejoin="round" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" /></>,
                download: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />,
                upload: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />,
                refresh: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 15H19c0 .667-.133 1.333-.4 2" />,
                edit: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />,
                check: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />,
                x: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />,
                lock: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />,
                unlock: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z" />
            };
            return <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" className={className}>{icons[name] || null}</svg>;
        }

        function App() {
            const [bancaInicial, setBancaInicial] = React.useState(() => {
                const saved = localStorage.getItem('tq_banca_inicial');
                return saved ? parseFloat(saved) : 1000.00;
            });
            const [tempBanca, setTempBanca] = React.useState(bancaInicial);
            const [isEditingBanca, setIsEditingBanca] = React.useState(false);
            const [muted, setMuted] = React.useState(false);
            const [historico, setHistorico] = React.useState(() => {
                const saved = localStorage.getItem('tq_historico');
                return saved ? JSON.parse(saved) : [];
            });

            const [formData, setFormData] = React.useState({ tipo: 'WIN', valor: '', descricao: '' });
            const [aiMessage, setAiMessage] = React.useState("Saudações, Operador. Eu sou o seu Guardião Psicológico. Registre suas operações e clique no botão abaixo para avaliar seu estado emocional e receber diretrizes de blindagem mental.");
            const [loadingAi, setLoadingAi] = React.useState(false);
            const [showResetModal, setShowResetModal] = React.useState(false);

            React.useEffect(() => {
                localStorage.setItem('tq_banca_inicial', bancaInicial.toString());
            }, [bancaInicial]);

            React.useEffect(() => {
                localStorage.setItem('tq_historico', JSON.stringify(historico));
            }, [historico]);

            const saveBancaValue = () => {
                const val = parseFloat(tempBanca);
                if (!isNaN(val) && val >= 0) {
                    setBancaInicial(val);
                    setIsEditingBanca(false);
                    playSound('success', muted);
                } else {
                    setTempBanca(bancaInicial);
                    setIsEditingBanca(false);
                }
            };

            const handleBancaKeyDown = (e) => {
                if (e.key === 'Enter') {
                    saveBancaValue();
                }
            };

            const totalProfitLoss = historico.reduce((acc, curr) => {
                return curr.tipo === 'WIN' ? acc + curr.valor : acc - curr.valor;
            }, 0);

            const bancaAtual = bancaInicial + totalProfitLoss;
            const totalWins = historico.filter(h => h.tipo === 'WIN').length;
            const totalLosses = historico.filter(h => h.tipo === 'LOSS').length;
            const totalTrades = historico.length;
            const winRate = totalTrades > 0 ? ((totalWins / totalTrades) * 100).toFixed(1) : "0.0";

            const xpTotal = historico.reduce((acc, curr) => {
                return acc + (curr.tipo === 'WIN' ? 150 : 50);
            }, 0);
            const currentLevel = Math.floor(xpTotal / 1000) + 1;
            const xpNextLevel = currentLevel * 1000;
            const xpPrevLevel = (currentLevel - 1) * 1000;
            const xpRelative = xpTotal - xpPrevLevel;
            const levelProgress = ((xpRelative / 1000) * 100).toFixed(1);

            const checkLevelUp = (oldH, newH) => {
                const oldXp = oldH.reduce((acc, curr) => acc + (curr.tipo === 'WIN' ? 150 : 50), 0);
                const newXp = newH.reduce((acc, curr) => acc + (curr.tipo === 'WIN' ? 150 : 50), 0);
                if (Math.floor(newXp / 1000) > Math.floor(oldXp / 1000)) {
                    playSound('level', muted);
                }
            };

            const handleAddTrade = (e) => {
                e.preventDefault();
                const val = parseFloat(formData.valor);
                if (isNaN(val) || val <= 0) return;

                const newTrade = {
                    id: Date.now().toString(),
                    date: new Date().toLocaleDateString('pt-BR') + ' ' + new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
                    tipo: formData.tipo,
                    valor: val,
                    descricao: formData.descricao.trim() || (formData.tipo === 'WIN' ? "Operação bem-sucedida" : "Loss controlado")
                };

                const updated = [newTrade, ...historico];
                checkLevelUp(historico, updated);
                setHistorico(updated);
                playSound(formData.tipo === 'WIN' ? 'success' : 'danger', muted);
                setFormData({ tipo: 'WIN', valor: '', descricao: '' });
            };

            const handleDeleteTrade = (id) => {
                const filtered = historico.filter(h => h.id !== id);
                setHistorico(filtered);
                playSound('click', muted);
            };

            const handleResetQuest = () => {
                playSound('click', muted);
                setShowResetModal(true);
            };

            const executeResetQuest = () => {
                setHistorico([]);
                setBancaInicial(1000.00);
                setTempBanca(1000.00);
                setShowResetModal(false);
                playSound('danger', muted);
                setAiMessage("Protocolo de reset executado. Nova jornada iniciada. Mantenha o gerenciamento sob controle firme.");
            };

            const exportBackup = () => {
                playSound('click', muted);
                const dataStr = JSON.stringify({ bancaInicial, historico }, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const exportFileDefaultName = `trader_quest_backup_${new Date().toISOString().slice(0,10)}.json`;

                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                linkElement.click();
            };

            const importBackup = (e) => {
                playSound('click', muted);
                const fileReader = new FileReader();
                if (e.target.files && e.target.files[0]) {
                    fileReader.readAsText(e.target.files[0], "UTF-8");
                    fileReader.onload = (event) => {
                        try {
                            const parsed = JSON.parse(event.target.result);
                            if (parsed && typeof parsed.bancaInicial === 'number' && Array.isArray(parsed.historico)) {
                                setBancaInicial(parsed.bancaInicial);
                                setTempBanca(parsed.bancaInicial);
                                setHistorico(parsed.historico);
                                playSound('success', muted);
                                alert("Backup importado com sucesso!");
                            } else {
                                alert("Formato de arquivo inválido.");
                            }
                        } catch (err) {
                            alert("Erro ao ler o arquivo de backup.");
                        }
                    };
                }
            };

            const fetchAiCounsel = async () => {
                playSound('click', muted);
                setLoadingAi(true);
                setAiMessage("Conectando à rede neural do Neon AI...");

                const contextPrompt = `
                    Você é o Guardião Psicológico de um Trader de Alta Performance. Seu estilo de resposta é futurista, cyber, motivador, analítico, direto e focado em controle emocional, disciplina extrema e gerenciamento de risco no trading.
                    Aqui estão as estatísticas atuais do operador:
                    - Banca Inicial: R$ ${bancaInicial.toFixed(2)}
                    - Banca Atual: R$ ${bancaAtual.toFixed(2)}
                    - Lucro/Prejuízo Acumulado: R$ ${totalProfitLoss.toFixed(2)}
                    - Total de Trades: ${totalTrades}
                    - Taxa de Acerto (WinRate): ${winRate}%
                    - Nível Atual no Sistema: Lvl ${currentLevel}
                    
                    Últimas 5 operações registradas:
                    ${historico.slice(0, 5).map(h => `- [${h.date}] ${h.tipo} de R$ ${h.valor.toFixed(2)} | Contexto: ${h.descricao}`).join('\n')}

                    Escreva uma análise psicológica direta, cyber e curta (máximo de 4 linhas) avaliando o desempenho do operador. Se ele estiver no lucro, parabenize mantendo os pés no chão. Se estiver no prejuízo, blinde a mente dele contra a ansiedade ou o desejo de vingança contra o mercado. Comece com uma saudação digna de um sistema militar de IA futurista.
                `;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: contextPrompt }] }]
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`Erro na API HTTP: ${response.status}`);
                    }

                    const data = await response.json();
                    if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts[0]) {
                        setAiMessage(data.candidates[0].content.parts[0].text);
                    } else {
                        setAiMessage("Erro na decodificação sináptica. Tente novamente, Operador.");
                    }
                } catch (error) {
                    console.error("AI Error:", error);
                    setAiMessage("Falha crítica de conexão à rede neural. Verifique sua chave de acesso ou conexão de dados.");
                } finally {
                    setLoadingAi(false);
                }
            };

            return (
                <div class="max-w-7xl mx-auto p-4 md:p-6 lg:p-8 space-y-6 relative z-10 font-rajdhani select-none">
                    
                    {/* TOP CONTROL HEADER */}
                    <div class="flex justify-between items-center bg-slate-900/60 backdrop-blur-md border border-slate-800 rounded-2xl px-6 py-4 neon-border-blue transition duration-300">
                        <div class="flex items-center gap-3">
                            <div class="w-3 h-3 bg-cyan-400 rounded-full animate-ping"></div>
                            <h1 class="text-xl md:text-2xl font-black tracking-wider text-cyan-400 font-orbitron neon-text-blue">TRADER QUEST <span class="text-xs text-slate-500 font-mono">v3.0</span></h1>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onClick={() => setMuted(!muted)} class="p-2.5 rounded-xl bg-slate-950/80 hover:bg-slate-800 border border-slate-800 text-slate-400 hover:text-cyan-400 transition">
                                <Icon name={muted ? "volumeMute" : "volume"} className="w-5 h-5"/>
                            </button>
                            <label class="p-2.5 rounded-xl bg-slate-950/80 hover:bg-slate-800 border border-slate-800 text-slate-400 hover:text-cyan-400 cursor-pointer transition">
                                <Icon name="upload" className="w-5 h-5"/>
                                <input type="file" accept=".json" onChange={importBackup} class="hidden" />
                            </label>
                            <button onClick={exportBackup} class="p-2.5 rounded-xl bg-slate-950/80 hover:bg-slate-800 border border-slate-800 text-slate-400 hover:text-cyan-400 transition">
                                <Icon name="download" className="w-5 h-5"/>
                            </button>
                            <button onClick={handleResetQuest} class="p-2.5 rounded-xl bg-slate-950/80 hover:bg-rose-950/40 border border-slate-800 hover:border-rose-900 text-slate-400 hover:text-rose-400 transition">
                                <Icon name="trash" className="w-5 h-5"/>
                            </button>
                        </div>
                    </div>

                    {/* UPPER STATS & HERO INTERFACE */}
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        
                        {/* PROFILE CARD & QUEST PROGRESS */}
                        <div class="lg:col-span-1 bg-slate-900/40 backdrop-blur-md border border-slate-900 rounded-3xl p-6 flex flex-col justify-between relative overflow-hidden group hover:border-slate-800 transition duration-300">
                            <div class="absolute inset-0 bg-gradient-to-tr from-cyan-500/5 via-transparent to-transparent opacity-40 pointer-events-none"></div>
                            <div class="flex items-center gap-4">
                                <div class="w-16 h-16 rounded-2xl bg-gradient-to-b from-cyan-400 to-blue-600 p-[1px] shadow-lg shadow-cyan-500/10">
                                    <div class="w-full h-full bg-slate-950 rounded-2xl flex flex-col items-center justify-center font-orbitron">
                                        <span class="text-xs text-slate-500 font-bold">LVL</span>
                                        <span class="text-2xl font-black text-cyan-400 neon-text-blue">{currentLevel}</span>
                                    </div>
                                </div>
                                <div class="space-y-0.5">
                                    <h2 class="text-lg font-bold tracking-wide font-orbitron text-slate-200">OPERADOR_LOG</h2>
                                    <p class="text-xs font-mono text-cyan-400 tracking-widest uppercase">Rank: Combatente de Elite</p>
                                </div>
                            </div>

                            <div class="space-y-2 mt-6">
                                <div class="flex justify-between text-xs font-mono text-slate-400 tracking-wider">
                                    <span>XP TOTAL: {xpTotal} pts</span>
                                    <span class="text-cyan-400">{levelProgress}%</span>
                                </div>
                                <div class="w-full h-2.5 bg-slate-950 rounded-full p-[2px] border border-slate-800">
                                    <div class="h-full bg-gradient-to-r from-cyan-500 to-blue-500 rounded-full shadow-md shadow-cyan-400/50 transition-all duration-500" style={{ width: `${levelProgress}%` }}></div>
                                </div>
                                <p class="text-[10px] font-mono text-slate-500 text-right">Faltam {xpNextLevel - xpTotal} XP para o próximo nível</p>
                            </div>
                        </div>

                        {/* LIVE CASH MATRIX COMPONENT */}
                        <div class={`lg:col-span-2 grid grid-cols-1 md:grid-cols-3 gap-4 p-4 rounded-3xl bg-slate-900/20 backdrop-blur-sm border transition duration-500 ${totalProfitLoss >= 0 ? 'neon-border-green/30 border-green-950/40' : 'neon-border-red/30 border-rose-950/40'}`}>
                            
                            {/* INITIAL INVESTMENT */}
                            <div class="bg-slate-950/80 rounded-2xl p-5 border border-slate-900 flex flex-col justify-between group transition">
                                <div class="flex justify-between items-start">
                                    <p class="text-xs font-mono text-slate-400 tracking-widest uppercase">Banca Inicial</p>
                                    <Icon name="wallet" className="w-5 h-5 text-slate-500 group-hover:text-cyan-400 transition"/>
                                </div>
                                <div class="mt-4 flex items-center gap-2">
                                    {isEditingBanca ? (
                                        <div class="flex items-center gap-1 w-full bg-slate-900 px-2 py-1 rounded-xl border border-cyan-500">
                                            <span class="text-xs font-mono text-slate-500">R$</span>
                                            <input 
                                                type="number" 
                                                step="0.01" 
                                                value={tempBanca}
                                                onChange={(e) => setTempBanca(e.target.value)}
                                                onKeyDown={handleBancaKeyDown}
                                                onBlur={saveBancaValue}
                                                autoFocus
                                                class="bg-transparent text-slate-200 font-orbitron font-bold text-base outline-none w-full"
                                            />
                                            <button onClick={saveBancaValue} class="text-green-400 hover:text-green-300">
                                                <Icon name="check" className="w-4 h-4"/>
                                            </button>
                                        </div>
                                    ) : (
                                        <div class="flex items-center justify-between w-full group/btn">
                                            <span class="text-xl font-black font-orbitron tracking-tight text-slate-200">R$ {bancaInicial.toFixed(2)}</span>
                                            <button onClick={() => { playSound('click', muted); setIsEditingBanca(true); }} class="opacity-0 group-hover/btn:opacity-100 p-1 bg-slate-900 rounded-lg text-slate-400 hover:text-cyan-400 transition">
                                                <Icon name="edit" className="w-3.5 h-3.5"/>
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* LIQUID CURRENT FLOW */}
                            <div class="bg-slate-950/80 rounded-2xl p-5 border border-slate-900 flex flex-col justify-between transition">
                                <div class="flex justify-between items-start">
                                    <p class="text-xs font-mono text-slate-400 tracking-widest uppercase">Banca Atual</p>
                                    <Icon name={totalProfitLoss >= 0 ? "trendingUp" : "trendingDown"} className={`w-5 h-5 ${totalProfitLoss >= 0 ? 'text-green-500' : 'text-rose-500'}`}/>
                                </div>
                                <div class="mt-4">
                                    <span class={`text-xl font-black font-orbitron tracking-tight ${bancaAtual >= bancaInicial ? 'text-green-400 neon-text-green' : 'text-rose-400 neon-text-red'}`}>
                                        R$ {bancaAtual.toFixed(2)}
                                    </span>
                                </div>
                            </div>

                            {/* MATRIX NET RESULT */}
                            <div class="bg-slate-950/80 rounded-2xl p-5 border border-slate-900 flex flex-col justify-between transition">
                                <div class="flex justify-between items-start">
                                    <p class="text-xs font-mono text-slate-400 tracking-widest uppercase">Net Retorno</p>
                                    <span class={`text-[10px] font-mono px-2 py-0.5 rounded-full border ${totalProfitLoss >= 0 ? 'bg-green-950/30 border-green-800/40 text-green-400' : 'bg-rose-950/30 border-rose-800/40 text-rose-400'}`}>
                                        {totalProfitLoss >= 0 ? '+' : ''}{totalTrades > 0 ? ((totalProfitLoss / bancaInicial) * 100).toFixed(2) : '0.00'}%
                                    </span>
                                </div>
                                <div class="mt-4">
                                    <span class={`text-xl font-black font-orbitron tracking-tight ${totalProfitLoss >= 0 ? 'text-green-400' : 'text-rose-400'}`}>
                                        R$ {totalProfitLoss.toFixed(2)}
                                    </span>
                                </div>
                            </div>

                        </div>
                    </div>

                    {/* INTERACTIVE ROW BLOCK (FORM + NEURAL INTERFACE) */}
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        
                        {/* MANUAL ENTRY FORMS */}
                        <div class="lg:col-span-5 bg-slate-900/40 backdrop-blur-md border border-slate-900 hover:border-slate-800 rounded-3xl p-6 transition duration-300">
                            <h3 class="text-base font-bold font-orbitron text-slate-300 tracking-wider mb-4 border-b border-slate-800/60 pb-2 flex items-center gap-2">
                                <span class="w-1.5 h-3 bg-cyan-400 rounded-full"></span>REGISTRAR OPERAÇÃO
                            </h3>
                            <form onSubmit={handleAddTrade} class="space-y-4">
                                <div>
                                    <label class="block text-xs font-mono text-slate-400 uppercase tracking-widest mb-1.5">Direção Operacional</label>
                                    <div class="grid grid-cols-2 gap-3">
                                        <button type="button" onClick={() => { playSound('click', muted); setFormData({ ...formData, tipo: 'WIN' }); }} class={`py-3 rounded-xl font-orbitron font-bold tracking-wider text-xs border transition ${formData.tipo === 'WIN' ? 'bg-green-500 border-green-400 text-slate-950 shadow-lg shadow-green-500/20' : 'bg-slate-950 border-slate-800 text-slate-400 hover:border-slate-700'}`}>
                                            WIN ⚔️
                                        </button>
                                        <button type="button" onClick={() => { playSound('click', muted); setFormData({ ...formData, tipo: 'LOSS' }); }} class={`py-3 rounded-xl font-orbitron font-bold tracking-wider text-xs border transition ${formData.tipo === 'LOSS' ? 'bg-rose-500 border-rose-400 text-slate-950 shadow-lg shadow-rose-500/20' : 'bg-slate-950 border-slate-800 text-slate-400 hover:border-slate-700'}`}>
                                            LOSS ☠️
                                        </button>
                                    </div>
                                </div>

                                <div>
                                    <label class="block text-xs font-mono text-slate-400 uppercase tracking-widest mb-1.5">Impacto Financeiro (R$)</label>
                                    <input 
                                        type="number" 
                                        step="0.01" 
                                        required 
                                        placeholder="0.00" 
                                        value={formData.valor}
                                        onChange={(e) => setFormData({ ...formData, valor: e.target.value })}
                                        class="w-full bg-slate-950 border border-slate-800 focus:border-slate-700 rounded-xl px-4 py-3 font-orbitron font-medium text-slate-200 text-sm outline-none placeholder:text-slate-700 transition"
                                    />
                                </div>

                                <div>
                                    <label class="block text-xs font-mono text-slate-400 uppercase tracking-widest mb-1.5">Notas do Mindset / Setup</label>
                                    <textarea 
                                        placeholder="Ex: Entrei a favor da tendência, mantive calma..." 
                                        rows="2"
                                        value={formData.descricao}
                                        onChange={(e) => setFormData({ ...formData, descricao: e.target.value })}
                                        class="w-full bg-slate-950 border border-slate-800 focus:border-slate-700 rounded-xl px-4 py-3 text-slate-200 text-sm outline-none placeholder:text-slate-700 transition resize-none"
                                    ></textarea>
                                </div>

                                <button type="submit" class="w-full py-4 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-slate-950 font-black font-orbitron text-xs tracking-widest rounded-xl shadow-lg shadow-cyan-500/10 hover:shadow-cyan-400/20 active:scale-[0.99] transition duration-150">
                                    CONCLUIR TASK OPERACIONAL
                                </button>
                            </form>
                        </div>

                        {/* NEURAL COUNSEL BOX (GEMINI AI ENGINE) */}
                        <div class="lg:col-span-7 bg-slate-900/40 backdrop-blur-md border border-slate-900 rounded-3xl p-6 flex flex-col justify-between group relative overflow-hidden transition duration-300 hover:border-slate-800">
                            <div class="absolute -right-16 -top-16 w-44 h-44 bg-cyan-500/5 rounded-full blur-3xl pointer-events-none group-hover:bg-cyan-500/10 transition duration-500"></div>
                            
                            <div>
                                <div class="flex justify-between items-center mb-4 border-b border-slate-800/60 pb-2">
                                    <h3 class="text-base font-bold font-orbitron text-slate-300 tracking-wider flex items-center gap-2">
                                        <Icon name="brain" className="w-5 h-5 text-cyan-400 animate-pulse"/> GUARDIÃO PSICOLÓGICO REAL
                                    </h3>
                                    <span class="text-[10px] font-mono px-2 py-0.5 rounded bg-cyan-950/40 text-cyan-400 border border-cyan-900/60 font-bold uppercase tracking-widest">Gemini Engine v1.5</span>
                                </div>
                                <div class="bg-slate-950/80 rounded-2xl p-4 border border-slate-900 min-h-[140px] flex items-center justify-center">
                                    {loadingAi ? (
                                        <div class="flex flex-col items-center gap-3 text-cyan-400 font-mono text-xs tracking-wider">
                                            <div class="w-6 h-6 border-2 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
                                            <span>SINCRONIZANDO ONDAS CEREBRAIS...</span>
                                        </div>
                                    ) : (
                                        <p class="text-sm text-slate-300 leading-relaxed font-sans italic text-center">
                                            "{aiMessage}"
                                        </p>
                                    )}
                                </div>
                            </div>

                            <button 
                                onClick={fetchAiCounsel}
                                disabled={loadingAi || totalTrades === 0}
                                class={`w-full mt-4 py-3 border font-orbitron font-bold text-xs tracking-wider rounded-xl transition ${totalTrades === 0 ? 'bg-slate-950 border-slate-900 text-slate-600 cursor-not-allowed' : 'bg-slate-950 hover:bg-slate-900 border-cyan-500/30 hover:border-cyan-400 text-cyan-400 shadow-sm shadow-cyan-500/5 hover:shadow-cyan-400/20'}`}
                            >
                                {totalTrades === 0 ? "REGISTRE TRADES PARA ATIVAR O CONSELHO" : "REQUISITAR DIRETRIZ MENTAL"}
                            </button>
                        </div>

                    </div>

                    {/* STATS ANALYTICS BAR */}
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-slate-900/40 border border-slate-900 rounded-2xl p-4 text-center">
                            <p class="text-xs font-mono text-slate-500 uppercase tracking-widest">Ações Totais</p>
                            <p class="text-xl font-bold font-orbitron text-slate-200 mt-1">{totalTrades}</p>
                        </div>
                        <div class="bg-slate-900/40 border border-slate-900 rounded-2xl p-4 text-center">
                            <p class="text-xs font-mono text-slate-500 uppercase tracking-widest">Sucessos (Win)</p>
                            <p class="text-xl font-bold font-orbitron text-green-400 mt-1">{totalWins}</p>
                        </div>
                        <div class="bg-slate-900/40 border border-slate-900 rounded-2xl p-4 text-center">
                            <p class="text-xs font-mono text-slate-500 uppercase tracking-widest">Falhas (Loss)</p>
                            <p class="text-xl font-bold font-orbitron text-rose-400 mt-1">{totalLosses}</p>
                        </div>
                        <div class="bg-slate-900/40 border border-slate-900 rounded-2xl p-4 text-center">
                            <p class="text-xs font-mono text-slate-500 uppercase tracking-widest">Taxa de Acerto</p>
                            <p class="text-xl font-bold font-orbitron text-cyan-400 mt-1">{winRate}%</p>
                        </div>
                    </div>

                    {/* HISTORY LOGS TABLE */}
                    <div class="bg-slate-900/40 backdrop-blur-md border border-slate-900 rounded-3xl p-6">
                        <h3 class="text-base font-bold font-orbitron text-slate-300 tracking-wider mb-4 border-b border-slate-800/60 pb-2 flex items-center gap-2">
                            <span class="w-1.5 h-3 bg-cyan-400 rounded-full"></span>LOG HISTÓRICO DE OPERAÇÕES
                        </h3>
                        
                        <div class="overflow-x-auto w-full">
                            {historico.length === 0 ? (
                                <div class="text-center py-12 bg-slate-950/60 rounded-2xl border border-slate-900 text-slate-600 font-mono text-xs tracking-wider">
                                    NENHUM DADO OPERACIONAL ENCONTRADO NO BANCO LOCAL
                                </div>
                            ) : (
                                <table class="w-full text-left border-collapse min-w-[600px]">
                                    <thead>
                                        <tr class="border-b border-slate-800/60 text-slate-500 font-mono text-xs uppercase tracking-widest">
                                            <th class="pb-3 pl-2">Data / Hora</th>
                                            <th class="pb-3">Tipo</th>
                                            <th class="pb-3">Valor</th>
                                            <th class="pb-3">Notas Psicológicas</th>
                                            <th class="pb-3 text-center">Ação</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-900/40 text-sm font-medium text-slate-300">
                                        {historico.map((trade) => (
                                            <tr key={trade.id} class="hover:bg-slate-900/20 transition group">
                                                <td class="py-3.5 pl-2 font-mono text-xs text-slate-500">{trade.date}</td>
                                                <td class="py-3.5">
                                                    <span class={`font-orbitron font-bold text-xs tracking-wider ${trade.tipo === 'WIN' ? 'text-green-400' : 'text-rose-400'}`}>
                                                        {trade.tipo}
                                                    </span>
                                                </td>
                                                <td class="py-3.5 font-orbitron text-slate-200">R$ {trade.valor.toFixed(2)}</td>
                                                <td class="py-3.5 text-xs text-slate-400 max-w-xs md:max-w-md truncate font-sans">{trade.descricao}</td>
                                                <td class="py-3.5 text-center">
                                                    <button onClick={() => handleDeleteTrade(trade.id)} class="p-1.5 rounded-lg bg-slate-950 border border-slate-900 text-slate-600 hover:text-rose-400 hover:border-rose-950 opacity-100 lg:opacity-0 group-hover:opacity-100 transition">
                                                        <Icon name="x" className="w-3.5 h-3.5"/>
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    </div>

                    {/* MODAL RESET CONFIRMATION */}
                    {showResetModal && (
                        <div class="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div class="bg-slate-900 border border-rose-900 max-w-md w-full rounded-2xl p-6 relative space-y-4 neon-border-red animate-scaleIn">
                                <div class="flex items-center gap-3 border-b border-rose-950 pb-2">
                                    <Icon name="trash" className="w-6 h-6 text-rose-500 animate-bounce" />
                                    <h4 class="text-base font-black font-orbitron tracking-wider text-rose-500">ALERTA CRÍTICO DE RESET</h4>
                                </div>
                                <p class="text-xs text-slate-300 leading-relaxed font-sans">Esta ação apagará todo o seu progresso diário, zerará sua banca acumulada e reiniciará a sua jornada. Tem certeza de que quer limpar este histórico?</p>
                                <div class="flex gap-2 pt-2">
                                    <button onClick={executeResetQuest} class="flex-1 py-3 bg-rose-500 hover:bg-rose-400 text-slate-950 font-bold font-orbitron text-xs tracking-wider rounded-xl transition duration-150">SIM, RESETAR ☠️</button>
                                    <button onClick={() => { playSound('click', muted); setShowResetModal(false); }} class="flex-1 py-3 bg-slate-900 hover:bg-slate-800 border border-slate-700 text-slate-400 font-mono text-xs tracking-wider rounded-xl transition duration-150">NÃO, CANCELAR</button>
                                </div>
                                <button onClick={() => { playSound('click', muted); setShowResetModal(false); }} class="absolute top-4 right-4 text-slate-500 hover:text-white transition">
                                    <Icon name="x" className="w-4 h-4"/>
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render((
            <React.StrictMode>
                <App />
            </React.StrictMode>
        ));
    </script>
</body>
</html>
